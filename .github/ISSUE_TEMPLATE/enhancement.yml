name: Enhancement Request
description: Suggest an improvement or a new feature for the project.
title: "[ENHANCEMENT]: "
labels: ["enhancement", "working", "help wanted", "testing"]
body:
  - markdown:
    attributes:
      value: |
        ### Issue Guidelines & Formatting
        * **Use Markdown:** Format your text clearly and wrap all code snippets, logs, or examples in code blocks (\`\`\`).
        * **Be Specific:** Keep your descriptions concise. If relevant, `@mention` specific team members, link to commit SHAs, and reference related issues or pull requests.

        ### Label Guide
        We use labels to categorize the type of issue and track its current status. 

        **Status Labels:**
        * **`working`**: Work is currently in progress.
        * **`help wanted`**: Not yet in progress; we are looking for somebody to work on it.
        * **`testing`**: Implementation is done and is currently undergoing testing.

        **Type Labels:**
        * **`bug`**: Something is broken or behaving unexpectedly.
        * **`documentation`**: Improvements, fixes, or additions to the project's documentation.
        * **`feature`**: A request for a brand new capability or tool.
        * **`enhancement`**: A suggested improvement or optimization for an existing feature.
  
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do you want to suggest this enhancement? What problem does it solve?
      placeholder: "Currently, there is no coherent or simple function to compute..."
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related
      description: Are there specific files or functions related to this enhancement?
      placeholder: "Example format (for entire files): src/logic.py; (for specific functions or variables) f(...) @ src/logic.py"
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Give an example of what this enhancement will look like (e.g. a code snippet).
      placeholder: |
        ```python
        # New expected behavior
        result = f(input_data)
        ```
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add links to related issues, pull requests, external documentation, or commit SHAs.
      placeholder: "e.g., #123, https://..."
    validations:
      required: false