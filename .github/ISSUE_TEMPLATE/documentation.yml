name: Documentation Request
description: Improvements or additions to docs.
title: "[DOCS]: "
labels: ["documentation", "working", "help wanted"]
body:
  - markdown:
    attributes:
      value: |
        ### Issue Guidelines & Formatting
        * **Use Markdown:** Format your text clearly and wrap all code snippets, logs, or examples in code blocks (\`\`\`).
        * **Be Specific:** Keep your descriptions concise. If relevant, `@mention` specific team members, link to commit SHAs, and reference related issues or pull requests.

        ### Label Guide
        We use labels to categorize the type of issue and track its current status. 

        **Status Labels:**
        * **`working`**: Work is currently in progress.
        * **`help wanted`**: Not yet in progress; we are looking for somebody to work on it.
        * **`testing`**: Implementation is done and is currently undergoing testing.

        **Type Labels:**
        * **`bug`**: Something is broken or behaving unexpectedly.
        * **`documentation`**: Improvements, fixes, or additions to the project's documentation.
        * **`feature`**: A request for a brand new capability or tool.
        * **`enhancement`**: A suggested improvement or optimization for an existing feature.
 
  - type: textarea
    id: description
    attributes:
      label: Description of Changes
      description: What documentation needs to be added, updated, or clarified?
      placeholder: "The docstring for f(...) is missing an explanation of its parameters."
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Files
      description: Which specific files, guides, or docstrings need updating?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Proposed Text (Optional)
      description: If you have a specific phrasing in mind, what should the new documentation say?
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add links to related issues, pull requests, external documentation, or commit SHAs.
      placeholder: "e.g., #123, https://..."
    validations:
      required: false